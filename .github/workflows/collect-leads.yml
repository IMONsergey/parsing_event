name: Собрать контакты BAEV

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  collect-leads:
    runs-on: ubuntu-latest
    if: github.event_name != 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run leads pipeline
        run: python src/leads_pipeline.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/contacts_ru.csv data/contacts_ru.json data/run_report.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update BAEV contacts data"
            git push
          fi
